name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library packages
        run: pnpm -r build

      - name: Run all tests
        run: pnpm test

      - name: Build web app
        run: pnpm --filter web build
        env:
          # The web build must not require any secrets; this guards against
          # accidental coupling to deployment-only environment variables.
          NODE_ENV: production
